# Dokploy Configuration for Clarin CRM
# =====================================
# This file is used by Dokploy to deploy the application

# Application Settings
name: clarin
description: WhatsApp Business CRM Multi-tenant

# Compose Configuration
compose:
  file: docker-compose.yml

# Domain Configuration
domains:
  - host: clarin.naperu.cloud
    https: true
    certificateType: letsencrypt

# Health Check
healthCheck:
  path: /health
  port: 8080
  interval: 30s
  timeout: 10s
  retries: 3

# Build Configuration
build:
  # Build all services
  services:
    - codex-bridge
    - backend
    - frontend

# Environment Variables (set these in Dokploy UI)
envExample:
  - POSTGRES_PASSWORD
  - JWT_SECRET
  - ADMIN_PASSWORD
  - REDIS_PASSWORD
  - EROS_ENABLED
  - EROS_CODEX_BRIDGE_URL
  - EROS_CODEX_BRIDGE_TOKEN
  - EROS_CODEX_ACCESS_TOKEN
  - EROS_CODEX_AUTH_FILE
  - EROS_CODEX_AUTH_FILE_HOST
  - EROS_CODEX_AUTH_MODE
  - EROS_CODEX_MODEL
  - EROS_CODEX_REASONING_EFFORT
  - EROS_CODEX_REQUEST_TIMEOUT_MS
  - EROS_CODEX_BRIDGE_TIMEOUT
  - EROS_MCP_BASE_URL
  - EROS_MCP_ACCESS_TOKEN

# Volumes (persistent storage)
volumes:
  - postgres_data
  - redis_data
  - whatsapp_sessions
  - codex_bridge_home

# Resources (optional - configure in Dokploy UI)
# resources:
#   backend:
#     cpu: 1
#     memory: 1024
#   frontend:
#     cpu: 0.5
#     memory: 512
